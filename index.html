<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wedding Invitation</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: #f6f3ef;
    font-family: Georgia, serif;
  }

  .screen {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* ENVELOPE */

  .envelope {
    position: relative;
    width: 90vw;
    max-width: 420px;
    aspect-ratio: 16 / 9;
    background: #f28c28;
    border-radius: 14px;
    cursor: pointer;
  }

  /* FLAP */

  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 55%;
    background: #ffe4c2;
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
    transform-origin: top center;
    transition: transform 0.5s ease;
    z-index: 3;
    pointer-events: none;
  }

  /* TICKET */

  .ticket {
    position: absolute;
    left: 50%;
    bottom: -55%;
    transform: translateX(-50%);
    width: 92%;
    background: #fff1dc;
    border-radius: 14px;
    padding: 18px;
    transition: bottom 0.7s ease;
    z-index: 2;
  }

  .ticket-inner {
    border: 2px solid #d8a15d;
    border-radius: 8px;
    padding: 28px 20px;
    text-align: center;
    position: relative;
  }

  .ticket-inner::before {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid #e3b879;
    border-radius: 6px;
  }

  /* PERFORATION */

  .ticket::before,
  .ticket::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 14px;
    height: 14px;
    background: #f6f3ef;
    border-radius: 50%;
    transform: translateY(-50%);
  }

  .ticket::before { left: -7px; }
  .ticket::after { right: -7px; }

  /* TEXT */

  h1 {
    margin: 0 0 12px;
    font-size: 28px;
    letter-spacing: 0.5px;
  }

  .date {
    font-size: 18px;
    margin: 0;
  }

</style>
</head>

<body>

<div class="screen">
  <div class="envelope" id="envelope">
    <div class="flap" id="flap"></div>

    <div class="ticket" id="ticket">
      <div class="ticket-inner">
        <h1>You’re Invited</h1>
        <p class="date">12 September</p>
      </div>
    </div>
  </div>
</div>

<script>
  const envelope = document.getElementById("envelope");
  const flap = document.getElementById("flap");
  const ticket = document.getElementById("ticket");

  let opened = false;

  envelope.addEventListener("click", () => {
    if (opened) return;
    opened = true;

    flap.style.transform = "rotateX(180deg)";

    setTimeout(() => {
      ticket.style.bottom = "8%";
    }, 300);
  });
</script>

</body>
</html>
