<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wedding RSVP</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="container">
    <div class="envelope">
      <div class="flap"></div>

      <div class="ticket hidden">
        <h1>You’re Invited</h1>
        <p class="date">12 September</p>
        <p class="deadline">Please respond by the end of May</p>

        <button id="open-rsvp">Open RSVP</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
